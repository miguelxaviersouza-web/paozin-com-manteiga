<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG 2D - A Conquista do Norte e Oeste</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a120b; /* Tom terra escuro, lembrando o Expressionismo e o café */
            color: #f5f2eb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 4px solid #3c2a21;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        /* Tela de introdução/Menu */
        #intro-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)), url('sua-imagem-estilo-theodoro-braga.jpg') center/cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            color: #e5ba73;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            max-width: 600px;
        }

        .btn {
            background-color: #c58940;
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #e5ba73;
            color: #1a120b;
        }

        /* Canvas do Jogo */
        canvas {
            background-color: #2c1e15; /* Cor de fundo do mapa (Terra Roxa) */
            display: block;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="intro-screen">
            <h1>A Conquista do Norte e Oeste</h1>
            <p>
                Entre o suor da terra roxa e a esperança de uma nova vida. 
                Vivencie o êxodo e a força dos migrantes paulistas, mineiros e nordestinos 
                na expansão da fronteira agrícola e no ciclo do café que moldou Londrina e Maringá.
            </p>
            <button class="btn" onclick="startGame()">Iniciar Jornada</button>
        </div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const introScreen = document.getElementById('intro-screen');

        // Configurações básicas do Jogador (Ex: Migrante Nordestino/Trabalhador)
        const player = {
            x: 50,
            y: 500,
            width: 40,
            height: 60,
            speed: 4,
            color: '#e5ba73'
        };

        // Controle de teclas
        const keys = {};

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function startGame() {
            // Esconde a tela de introdução
            introScreen.style.display = 'none';
            // Inicia o loop do jogo
            gameLoop();
        }

        function update() {
            // Movimentação simples em 2D (Top-down ou Plataforma Lateral, dependendo da sua escolha)
            if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;
            if (keys['ArrowUp'] || keys['KeyW']) player.y -= player.speed;
            if (keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;

            // Limites da tela
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            if (player.y < 0) player.y = 0;
            if (player.y + player.height > canvas.height) player.y = canvas.height - player.height;
        }

        function draw() {
            // Limpa o canvas a cada frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenha o chão/cenário de fundo (Representando a "Terra Roxa")
            ctx.fillStyle = '#3c2a21';
            ctx.fillRect(0, 450, canvas.width, 150); 

            // Elemento de cenário simbólico: Café / Cidade Planejada em construção
            ctx.fillStyle = '#65451f';
            ctx.fillRect(600, 350, 150, 250); // Representação de um casarão de café ou Londrina brotando da mata
            
            ctx.fillStyle = '#fff';
            ctx.font = '14px sans-serif';
            ctx.fillText("Futura Londrina/Maringá", 610, 340);

            // Desenha o jogador (Substituir por Sprite futuramente)
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Rótulo temporário do jogador
            ctx.fillStyle = '#fff';
            ctx.font = '12px sans-serif';
            ctx.fillText("Migrante", player.x - 5, player.y - 10);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
